<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест CSM 2.0 — Области 1 и 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 24px 16px;
            color: #1e293b;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e4b6e 0%, #2c7da0 100%);
            color: white;
            padding: 28px;
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .header p { opacity: 0.9; }
        .content { padding: 28px; }
        .user-info {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 32px;
        }
        .form-group { max-width: 400px; }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #334155;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }
        .area-title {
            background: #e6f0f5;
            padding: 16px 20px;
            margin: 0 -28px 24px -28px;
            border-left: 6px solid #2c7da0;
            font-size: 1.4rem;
            font-weight: 600;
        }
        .question-block {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e2e8f0;
        }
        .question-text {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 16px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-left: 16px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .open-question textarea {
            min-height: 100px;
            margin-top: 12px;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 16px;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }
        button.secondary {
            background: #94a3b8;
        }
        button.secondary:hover { background: #64748b; }
        button:hover {
            background: #1e5a74;
            transform: translateY(-1px);
        }
        .submit-btn {
            background: #10b981;
            width: 100%;
            margin-top: 16px;
        }
        .submit-btn:hover { background: #059669; }
        .message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            font-weight: 500;
        }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 20px;
        }
        iframe { display: none; }
        @media (max-width: 640px) {
            .content { padding: 20px; }
            .area-title { margin: 0 -20px 24px -20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📋 Тест CSM 2.0</h1>
            <p>Области 1 и 2</p>
        </div>
        <div class="content" id="app"></div>
    </div>
    <footer>Данные сохраняются в браузере. Вы можете закрыть страницу и продолжить позже.</footer>
</div>

<iframe name="hiddenFrame" style="display:none"></iframe>

<script>
    // ⚠️ ВСТАВЬТЕ ВАШ НОВЫЙ URL ПОСЛЕ ПЕРЕРАЗВЕРТЫВАНИЯ СКРИПТА
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF5Jyk1GZOkh8LZueWYWSpZGB49tkQxwE4Mi3oI1gK1N99pifpJE8ZIFIPapmyEKEKfQ/exec";

    // Данные областей
    const areas = [
        {
            name: "ОБЛАСТЬ 1. ОСОЗНАНИЕ (тренды, технологии, цифровая трансформация)",
            closed: [
                { text: "Что из перечисленного является ключевым отличием Web 3.0 от Web 2.0?", options: ["A) Появление социальных сетей", "B) Децентрализация данных и управление через блокчейн", "C) Увеличение скорости интернета", "D) Переход от мобильных приложений к десктопным"], correct: "B" },
                { text: "Какой из трендов НЕ относится к Industry 4.0?", options: ["A) Интернет вещей (IoT)", "B) Большие данные (Big Data)", "C) Ручной труд без цифровизации", "D) Облачные вычисления (Cloud)"], correct: "C" },
                { text: "Что является основной целью цифровой трансформации в крупном банке?", options: ["A) Повышение скорости, эффективности и качества клиентского опыта за счёт цифровых технологий", "B) Замена всех сотрудников роботами", "C) Снижение зарплат IT-специалистам", "D) Переход на бумажный документооборот"], correct: "A" },
                { text: "Что из перечисленного является примером использования Big Data в банковской сфере?", options: ["A) Печать документов на принтере", "B) Увеличение числа банкоматов", "C) Замена офисов коворкингами", "D) Персонализация предложений на основе транзакционной истории клиента"], correct: "D" }
            ],
            open: { text: "Назовите 2–3 технологических тренда (из перечисленных выше или других), которые вы уже использовали или видите потенциал применить в вашей работе. Кратко опишите, как именно." }
        },
        {
            name: "ОБЛАСТЬ 2. СТРАТЕГИЯ",
            closed: [
                { text: "Что из перечисленного НЕ входит в канву бизнес-модели (Business Model Canvas)?", options: ["A) Ценностные предложения", "B) Ключевые партнёры", "C) Потоки доходов", "D) Годовая отчётность перед акционерами"], correct: "D" },
                { text: "Какой элемент является центральным в концепции LoveMark?", options: ["A) Низкая цена", "B) Максимальное количество продуктов в линейке", "C) Агрессивная реклама", "D) Эмоциональная связь с брендом, выходящая за рамки рациональной выгоды"], correct: "D" },
                { text: "Что такое «карта гипотез» в контексте поиска точек роста?", options: ["A) Географическая карта офисов", "B) Схема проезда до работы", "C) План эвакуации при пожаре", "D) Структурированный перечень предположений о том, как улучшить бизнес, с приоритетами и критериями проверки"], correct: "D" },
                { text: "Что из перечисленного является примером человекоцентричности в банковском сервисе?", options: ["A) Увеличение числа продуктов в линейке", "B) Снижение затрат на поддержку", "C) Проектирование сервиса вокруг потребностей клиента, а не внутренних процессов банка", "D) Автоматизация без возможности обратиться к человеку"], correct: "C" }
            ],
            open: { text: "Приведите 1–2 примера из вашей работы, где вы применяли стратегическое мышление или работали с гипотезами роста для клиента / партнёра. Что это было за ситуация? Какие шаги предприняли?" }
        }
    ];

    let currentArea = 0;
    let answers = {
        userName: "",
        closed: [[], []],
        open: ["", ""]
    };

    function loadFromLocalStorage() {
        const saved = localStorage.getItem("csm_test_areas");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                answers.userName = parsed.userName || "";
                answers.closed = parsed.closed || [[], []];
                answers.open = parsed.open || ["", ""];
                for (let i = 0; i < 2; i++) {
                    if (!answers.closed[i]) answers.closed[i] = [];
                    while (answers.closed[i].length < 4) answers.closed[i].push(null);
                }
            } catch(e) {}
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem("csm_test_areas", JSON.stringify(answers));
    }

    function renderArea() {
        const app = document.getElementById("app");
        const area = areas[currentArea];

        let html = `
            <div class="user-info">
                <h3>👤 Ваши данные (не анонимно)</h3>
                <div class="form-group">
                    <label>ФИО *</label>
                    <input type="text" id="fio" value="${escapeHtml(answers.userName)}" placeholder="Иванов Иван Иванович">
                </div>
            </div>
            <div class="area-title">📌 ${area.name}</div>
        `;

        // Закрытые вопросы
        for (let i = 0; i < area.closed.length; i++) {
            const q = area.closed[i];
            const savedVal = answers.closed[currentArea]?.[i];
            html += `<div class="question-block">
                        <div class="question-text">${currentArea+1}.${i+1}. ${escapeHtml(q.text)}</div>
                        <div class="options" data-qidx="${i}">`;
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65+idx);
                const isChecked = (savedVal === letter);
                html += `<label class="option">
                            <input type="radio" name="q_${i}" value="${letter}" ${isChecked ? 'checked' : ''}>
                            <span>${escapeHtml(opt)}</span>
                         </label>`;
            });
            html += `</div></div>`;
        }

        // Открытый вопрос
        html += `<div class="question-block open-question">
                    <div class="question-text">${currentArea+1}.5 (открытый). ${escapeHtml(area.open.text)}</div>
                    <textarea id="openAnswer" rows="4">${escapeHtml(answers.open[currentArea] || '')}</textarea>
                </div>`;

        // Навигация
        html += `<div class="navigation">`;
        if (currentArea > 0) html += `<button class="secondary" id="prevBtn">← Назад</button>`;
        else html += `<div></div>`;
        if (currentArea < areas.length - 1) html += `<button id="nextBtn">Далее →</button>`;
        else html += `<button id="submitBtn" class="submit-btn">✅ Завершить и отправить опрос</button>`;
        html += `</div>`;

        app.innerHTML = html;

        // События
        document.getElementById("fio")?.addEventListener('input', (e) => {
            answers.userName = e.target.value;
            saveToLocalStorage();
        });

        for (let i = 0; i < area.closed.length; i++) {
            const radios = document.querySelectorAll(`input[name="q_${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    answers.closed[currentArea][i] = e.target.value;
                    saveToLocalStorage();
                });
            });
        }

        document.getElementById("openAnswer")?.addEventListener('input', (e) => {
            answers.open[currentArea] = e.target.value;
            saveToLocalStorage();
        });

        document.getElementById("prevBtn")?.addEventListener('click', () => {
            if (validateCurrentArea()) {
                currentArea--;
                renderArea();
            } else {
                showMessage("❌ Ответьте на все закрытые вопросы в текущей области", 'error');
            }
        });

        document.getElementById("nextBtn")?.addEventListener('click', () => {
            if (validateCurrentArea()) {
                currentArea++;
                renderArea();
            } else {
                showMessage("❌ Ответьте на все закрытые вопросы в текущей области", 'error');
            }
        });

        document.getElementById("submitBtn")?.addEventListener('click', submitAll);
    }

    function validateCurrentArea() {
        const closed = answers.closed[currentArea];
        if (!closed) return false;
        return closed.length === 4 && closed.every(v => v !== null && v !== undefined);
    }

    function validateFio() {
        if (!answers.userName?.trim()) {
            showMessage("❌ Пожалуйста, введите ваше ФИО", 'error');
            return false;
        }
        return true;
    }

    function submitAll() {
        if (!validateFio()) return;
        for (let i = 0; i < areas.length; i++) {
            const closed = answers.closed[i];
            if (!closed || closed.length !== 4 || closed.some(v => v === null || v === undefined)) {
                currentArea = i;
                renderArea();
                showMessage(`❌ Ответьте на все закрытые вопросы в области ${i+1}`, 'error');
                return;
            }
        }

        const now = new Date();
        const date = now.toLocaleDateString('ru-RU');
        const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = SCRIPT_URL;
        form.target = 'hiddenFrame';

        const fields = { userName: answers.userName, date, time };

        // Добавляем ответы области 1
        for (let i = 0; i < 4; i++) {
            const val = answers.closed[0][i];
            const correct = (val === areas[0].closed[i].correct) ? "Да" : "Нет";
            fields[`q${i+1}`] = val;
            fields[`q${i+1}correct`] = correct;
        }
        fields.q5open = answers.open[0] || "(не заполнено)";

        // Добавляем ответы области 2
        for (let i = 0; i < 4; i++) {
            const val = answers.closed[1][i];
            const correct = (val === areas[1].closed[i].correct) ? "Да" : "Нет";
            fields[`q2_${i+1}`] = val;
            fields[`q2_${i+1}correct`] = correct;
        }
        fields.q2_5open = answers.open[1] || "(не заполнено)";

        for (const [key, value] of Object.entries(fields)) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = value;
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);

        showMessage(`✅ Спасибо, ${answers.userName}! Все ответы сохранены.`, 'success');
        localStorage.removeItem("csm_test_areas");
        
        setTimeout(() => {
            answers = { userName: "", closed: [[], []], open: ["", ""] };
            currentArea = 0;
            renderArea();
        }, 3000);
    }

    function showMessage(text, type) {
        const msgDiv = document.getElementById("message") || (() => {
            const div = document.createElement("div");
            div.id = "message";
            document.getElementById("app").appendChild(div);
            return div;
        })();
        msgDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
        if (type === 'success') setTimeout(() => msgDiv.innerHTML = '', 5000);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadFromLocalStorage();
    renderArea();
</script>
</body>
</html>
