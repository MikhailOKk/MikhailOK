<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест CSM 2.0</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #1e4b6e;
            margin-bottom: 8px;
        }
        .sub {
            color: #64748b;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #1e5a74; }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
        }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
        iframe {
            display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📋 Тест CSM 2.0</h1>
    <div class="sub">Пожалуйста, представьтесь</div>

    <input type="text" id="fio" placeholder="Ваше ФИО" autocomplete="off">
    <button id="sendBtn">Отправить результат</button>
    <div id="message"></div>
</div>

<!-- Скрытая форма для отправки без CORS -->
<iframe name="hiddenFrame" style="display:none"></iframe>

<script>
    // ⚠️ ВСТАВЬТЕ ВАШ НОВЫЙ URL ПОСЛЕ ПЕРЕРАЗВЕРТЫВАНИЯ
    const SCRIPT_URL = "https://script.google.com/macros/s/ВАШ_НОВЫЙ_URL/exec";

    const sendBtn = document.getElementById('sendBtn');
    const fioInput = document.getElementById('fio');
    const messageDiv = document.getElementById('message');

    sendBtn.addEventListener('click', () => {
        const name = fioInput.value.trim();
        if (!name) {
            showMessage('Введите ФИО', 'error');
            return;
        }

        sendBtn.disabled = true;
        sendBtn.textContent = 'Отправка...';
        showMessage('Отправляем данные...', '');

        const now = new Date();
        const date = now.toLocaleDateString('ru-RU');
        const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        // Создаём скрытую форму и отправляем её
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = SCRIPT_URL;
        form.target = 'hiddenFrame'; // отправляем в невидимый iframe, чтобы страница не перезагружалась

        const nameField = document.createElement('input');
        nameField.type = 'hidden';
        nameField.name = 'userName';
        nameField.value = name;

        const dateField = document.createElement('input');
        dateField.type = 'hidden';
        dateField.name = 'date';
        dateField.value = date;

        const timeField = document.createElement('input');
        timeField.type = 'hidden';
        timeField.name = 'time';
        timeField.value = time;

        form.appendChild(nameField);
        form.appendChild(dateField);
        form.appendChild(timeField);

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);

        // Показываем успех (форма отправилась, скрипт сам закроет окно)
        showMessage(`✅ Спасибо, ${name}! Данные сохранены.`, 'success');
        fioInput.value = '';

        sendBtn.disabled = false;
        sendBtn.textContent = 'Отправить результат';
    });

    function showMessage(text, type) {
        messageDiv.innerHTML = text ? `<div class="message ${type}">${text}</div>` : '';
    }
</script>
</body>
</html>
