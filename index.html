<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Тест CSM 2.0 — Динамический</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="card" id="surveyCard">
        <div class="header">
            <h1>📊 Оценка CSM 2.0</h1>
            <p>Загрузка вопросов...</p>
        </div>
    </div>
    <footer>📌 Прогресс автоматически сохраняется в браузере</footer>
</div>

<script>
    // ⚠️ ВСТАВЬТЕ ВАШ URL ДЛЯ ПОЛУЧЕНИЯ ВОПРОСОВ (doGet)
    const QUESTIONS_URL = "https://script.google.com/macros/s/AKfycbzmQ4HUWxYGpNl0GQ8CLWDpXmN9ssMG-P7iSMAE7DIu7kvl_1re5Dh-1NZEcPSJc7cBSw/exec";
    
    // ⚠️ ВСТАВЬТЕ ВАШ URL ДЛЯ ОТПРАВКИ РЕЗУЛЬТАТОВ (doPost)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQqP2wBKFw0_iCoNkyt74OApczk1epS0AGz5bcnCMODo_fzKmUf1GSf2IThTHNYh7YHA/exec";

    let AREAS = [];
    let currentArea = 0;
    let answers = {
        userName: "",
        userEmail: "",
        closed: [],
        open: []
    };
    let submissionInProgress = false;
    let dataLoaded = false;

    function loadFromLocalStorage() {
        if (!dataLoaded || AREAS.length === 0) return;
        const saved = localStorage.getItem("csm_full_v3");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                answers.userName = parsed.userName || "";
                answers.userEmail = parsed.userEmail || "";
                answers.closed = parsed.closed || AREAS.map(() => []);
                answers.open = parsed.open || AREAS.map(() => "");
                for (let i = 0; i < AREAS.length; i++) {
                    if (!answers.closed[i]) answers.closed[i] = [];
                    while (answers.closed[i].length < AREAS[i].closedCount) answers.closed[i].push(null);
                }
            } catch(e) {}
        }
    }

    function saveToLocalStorage() {
        if (!dataLoaded) return;
        localStorage.setItem("csm_full_v3", JSON.stringify(answers));
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showMessage(text, type) {
        let msgDiv = document.getElementById("dynamicMessage");
        const contentDiv = document.querySelector("#surveyCard .content");
        if (!msgDiv && contentDiv) {
            msgDiv = document.createElement("div");
            msgDiv.id = "dynamicMessage";
            contentDiv.appendChild(msgDiv);
        }
        if (msgDiv) msgDiv.innerHTML = `<div class="message ${type}">${escapeHtml(text)}</div>`;
        setTimeout(() => { if(msgDiv) msgDiv.innerHTML = ''; }, 4000);
    }

    function validateCurrentArea() {
        if (!dataLoaded) return false;
        const closed = answers.closed[currentArea];
        if (!closed) return false;
        return closed.length === AREAS[currentArea].closedCount && closed.every(v => v !== null && v !== undefined);
    }

    function closeTest() {
        window.close();
        alert("Закройте эту вкладку вручную, чтобы завершить тест.");
    }

    function render() {
        if (!dataLoaded || AREAS.length === 0) return;
        
        const card = document.getElementById("surveyCard");
        const area = AREAS[currentArea];
        const total = AREAS.length;
        const percent = ((currentArea + 1) / total) * 100;

        let html = `
            <div class="header">
                <h1>📊 Оценка CSM 2.0</h1>
                <p>8 областей компетенций • Тест с автоматическим подсчетом</p>
            </div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                <div class="progress-text">Область ${currentArea+1} из ${total}</div>
            </div>
            <div class="content">
                <div class="user-info">
                    <div class="form-group"><label>👤 ФИО *</label><input type="text" id="fio" value="${escapeHtml(answers.userName)}" placeholder="Иванов Иван Иванович"></div>
                    <div class="form-group"><label>📧 Электронная почта *</label><input type="email" id="email" value="${escapeHtml(answers.userEmail)}" placeholder="example@domain.com"></div>
                </div>
                <div class="area-title">📌 ${escapeHtml(area.name)}</div>
        `;

        for (let i = 0; i < area.closed.length; i++) {
            const q = area.closed[i];
            const savedVal = answers.closed[currentArea]?.[i];
            html += `<div class="question-block"><div class="question-text">${currentArea+1}.${i+1}. ${escapeHtml(q.text)}</div><div class="options">`;
            for (let optIdx = 0; optIdx < q.options.length; optIdx++) {
                const letter = String.fromCharCode(65 + optIdx);
                const isChecked = (savedVal === letter);
                html += `<label class="option"><input type="radio" name="q_${i}" value="${letter}" ${isChecked ? 'checked' : ''}><span>${escapeHtml(q.options[optIdx])}</span></label>`;
            }
            html += `</div></div>`;
        }

        if (area.open) {
            html += `<div class="question-block open-question"><div class="question-text">${currentArea+1}.${area.closed.length+1} (открытый). ${escapeHtml(area.openText)}</div>
                      <textarea id="openAnswer" rows="4">${escapeHtml(answers.open[currentArea] || '')}</textarea></div>`;
        }

        html += `<div class="navigation">`;
        if (currentArea > 0) html += `<button class="secondary" id="prevBtn">← Назад</button>`;
        else html += `<div></div>`;
        if (currentArea < total-1) html += `<button id="nextBtn">Далее →</button>`;
        else html += `<button id="submitBtn" class="submit-btn">✅ Завершить и отправить</button>`;
        html += `</div></div>`;

        card.innerHTML = html;

        document.getElementById("fio")?.addEventListener('input', (e) => { answers.userName = e.target.value; saveToLocalStorage(); });
        document.getElementById("email")?.addEventListener('input', (e) => { answers.userEmail = e.target.value; saveToLocalStorage(); });

        for (let i = 0; i < area.closed.length; i++) {
            const radios = document.querySelectorAll(`input[name="q_${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    answers.closed[currentArea][i] = e.target.value;
                    saveToLocalStorage();
                });
            });
        }

        if (area.open) {
            document.getElementById("openAnswer")?.addEventListener('input', (e) => {
                answers.open[currentArea] = e.target.value;
                saveToLocalStorage();
            });
        }

        document.getElementById("prevBtn")?.addEventListener('click', () => {
            if (validateCurrentArea()) { currentArea--; render(); window.scrollTo({top:0, behavior:'smooth'}); }
            else showMessage("❌ Ответьте на все закрытые вопросы в этой области", "error");
        });
        document.getElementById("nextBtn")?.addEventListener('click', () => {
            if (validateCurrentArea()) { currentArea++; render(); window.scrollTo({top:0, behavior:'smooth'}); }
            else showMessage("❌ Ответьте на все закрытые вопросы в этой области", "error");
        });
        document.getElementById("submitBtn")?.addEventListener('click', submitAll);
    }

    function submitAll() {
        if (submissionInProgress || !dataLoaded) return;
        
        if (!answers.userName.trim()) { showMessage("❌ Укажите ФИО", "error"); return; }
        if (!answers.userEmail.trim() || !answers.userEmail.includes('@')) { showMessage("❌ Укажите корректный email", "error"); return; }

        for (let i = 0; i < AREAS.length; i++) {
            const closedArr = answers.closed[i];
            if (!closedArr || closedArr.length !== AREAS[i].closedCount || closedArr.some(v => v === null)) {
                currentArea = i;
                render();
                showMessage(`❌ Ответьте на все закрытые вопросы в области ${i+1}`, "error");
                return;
            }
        }

        submissionInProgress = true;
        showMessage("⏳ Отправка результатов...", "success");

        const now = new Date();
        const dateStr = now.toLocaleDateString('ru-RU');
        const timeStr = now.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

        let payload = { userName: answers.userName, userEmail: answers.userEmail, date: dateStr, time: timeStr };

        for (let a = 0; a < AREAS.length; a++) {
            const area = AREAS[a];
            const closedAnswers = answers.closed[a];
            const scores = [];
            for (let q = 0; q < area.closed.length; q++) {
                const isCorrect = (closedAnswers[q] === area.closed[q].correct);
                const percentScore = isCorrect ? 100 : 0;
                scores.push(percentScore);
                payload[`area_${a+1}_q${q+1}_percent`] = percentScore;
            }
            const avgScore = scores.length ? Math.round(scores.reduce((s,v)=>s+v,0) / scores.length) : 0;
            payload[`area_${a+1}_avg`] = avgScore;
            payload[`area_${a+1}_open`] = answers.open[a] || "(не заполнено)";
        }

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams(payload)
        }).then(() => {
            showResultPage();
        }).catch(() => {
            showMessage("❌ Ошибка при отправке. Проверьте интернет-соединение.", "error");
            submissionInProgress = false;
        });
    }

    function showResultPage() {
        let totalCorrectSum = 0;
        let totalClosedCount = 0;
        for (let a = 0; a < AREAS.length; a++) {
            for (let q = 0; q < AREAS[a].closed.length; q++) {
                const isCorr = (answers.closed[a][q] === AREAS[a].closed[q].correct);
                totalCorrectSum += isCorr ? 100 : 0;
                totalClosedCount++;
            }
        }
        const overallPercent = totalClosedCount ? Math.round(totalCorrectSum / totalClosedCount) : 0;
        
        const card = document.getElementById("surveyCard");
        let gradeText = overallPercent >= 90 ? "🔥 Отлично! Вы эксперт" : (overallPercent >= 75 ? "👍 Хорошо" : (overallPercent >= 50 ? "📚 Средний уровень" : "🎯 Начальный уровень"));
        
        card.innerHTML = `
            <div class="header"><h1>📋 Тест CSM 2.0</h1><p>Результат</p></div>
            <div class="thankyou">
                <h2>🙏 Спасибо, ${escapeHtml(answers.userName)}!</h2>
                <p>Ваш результат: <strong>${overallPercent}%</strong> правильных ответов.</p>
                <p>${gradeText}</p>
                <p style="font-size:0.9rem; color:#1f6e8c; margin-bottom: 1.5rem;">✅ Результаты успешно отправлены</p>
                <button class="close-btn" onclick="closeTest()">🚪 Закрыть тест</button>
            </div>
        `;
        const footer = document.querySelector("footer");
        if(footer) footer.style.display = "none";
        localStorage.removeItem("csm_full_v3");
    }

    // Загрузка вопросов из Google Таблицы
    async function loadQuestions() {
        try {
            console.log("Загрузка вопросов из:", QUESTIONS_URL);
            const response = await fetch(QUESTIONS_URL);
            const text = await response.text();
            console.log("Ответ сервера:", text);
            
            AREAS = JSON.parse(text);
            
            if (AREAS.error) {
                throw new Error(AREAS.error);
            }
            
            if (AREAS.length === 0) {
                throw new Error("Нет областей с вопросами");
            }
            
            dataLoaded = true;
            
            answers.closed = AREAS.map(() => []);
            answers.open = AREAS.map(() => "");
            for (let i = 0; i < AREAS.length; i++) {
                answers.closed[i] = new Array(AREAS[i].closedCount).fill(null);
            }
            
            loadFromLocalStorage();
            render();
        } catch (error) {
            console.error("Ошибка загрузки вопросов:", error);
            const card = document.getElementById("surveyCard");
            card.innerHTML = `
                <div class="header"><h1>⚠️ Ошибка загрузки</h1></div>
                <div class="thankyou">
                    <p>Не удалось загрузить вопросы: ${error.message}</p>
                    <p style="font-size:0.8rem; margin-top:1rem;">Проверьте:</p>
                    <ul style="text-align:left; display:inline-block; margin-top:0.5rem;">
                        <li>Что лист в таблице называется <strong>"Вопросы"</strong></li>
                        <li>Что скрипт развёрнут как веб-приложение с доступом "Anyone"</li>
                        <li>Что URL в QUESTIONS_URL правильный</li>
                    </ul>
                    <button onclick="location.reload()" style="margin-top:1.5rem;">🔄 Перезагрузить</button>
                </div>
            `;
        }
    }

    loadQuestions();
</script>
</body>
</html>
