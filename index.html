<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест CSM 2.0 — 8 областей</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #1e293b;
        }
        .container { max-width: 950px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e4b6e 0%, #2c7da0 100%);
            color: white;
            padding: 28px;
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .progress-section {
            padding: 12px 28px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .progress-bar {
            background: #e2e8f0;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: #2c7da0;
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 0.8rem;
            margin-top: 6px;
            color: #475569;
            text-align: right;
        }
        .content { padding: 28px; }
        .user-info {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 28px;
        }
        .form-group { max-width: 400px; }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
        }
        .area-title {
            background: #e6f0f5;
            padding: 14px 20px;
            margin: 0 -28px 24px -28px;
            border-left: 6px solid #2c7da0;
            font-size: 1.35rem;
            font-weight: 600;
        }
        .question-block {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 14px;
            font-size: 1rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-left: 16px;
        }
        .option {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1.4;
        }
        .option input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .option span {
            font-size: 1rem !important;
            font-weight: normal !important;
            color: #1e293b !important;
            line-height: 1.4 !important;
        }
        .open-question textarea { min-height: 100px; margin-top: 8px; }
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 24px;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }
        button.secondary { background: #94a3b8; }
        button:hover { background: #1e5a74; }
        .submit-btn {
            background: #10b981;
            width: 100%;
            margin-top: 16px;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-weight: 500;
        }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
        footer { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 16px; }
        iframe { display: none; }
        
        @media (max-width: 768px) {
            .option span {
                font-size: 0.95rem !important;
            }
            .question-text {
                font-size: 0.95rem;
            }
            .content { padding: 20px; }
            .area-title { margin: 0 -20px 24px -20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="surveyCard"></div>
    <footer>Прогресс автоматически сохраняется. Вы можете закрыть страницу и продолжить позже.</footer>
</div>
<iframe name="hiddenFrame" style="display:none"></iframe>

<script>
    // ⚠️ ВСТАВЬТЕ ВАШ URL ПОСЛЕ ПЕРЕРАЗВЕРТЫВАНИЯ СКРИПТА
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-89h8VhIoddbVD1ig8i_VmQGSVjUATDj76JvdVoZ91xKdi0n8olO6o9l7rvjFJfCq5w/exec";

    const AREAS = [
        { name: "ОБЛАСТЬ 1. ОСОЗНАНИЕ (тренды, технологии, цифровая трансформация)", closedCount: 4, open: true,
          closed: [
            { text: "Что из перечисленного является ключевым отличием Web 3.0 от Web 2.0?", options: ["Появление социальных сетей", "Децентрализация данных и управление через блокчейн", "Увеличение скорости интернета", "Переход от мобильных приложений к десктопным"], correct: "B" },
            { text: "Какой из трендов НЕ относится к Industry 4.0?", options: ["Интернет вещей (IoT)", "Большие данные (Big Data)", "Ручной труд без цифровизации", "Облачные вычисления (Cloud)"], correct: "C" },
            { text: "Что является основной целью цифровой трансформации в крупном банке?", options: ["Повышение скорости, эффективности и качества клиентского опыта за счёт цифровых технологий", "Замена всех сотрудников роботами", "Снижение зарплат IT-специалистам", "Переход на бумажный документооборот"], correct: "A" },
            { text: "Что из перечисленного является примером использования Big Data в банковской сфере?", options: ["Печать документов на принтере", "Увеличение числа банкоматов", "Замена офисов коворкингами", "Персонализация предложений на основе транзакционной истории клиента"], correct: "D" }
          ], openText: "Назовите 2–3 технологических тренда (из перечисленных выше или других), которые вы уже использовали или видите потенциал применить в вашей работе. Кратко опишите, как именно." },
        { name: "ОБЛАСТЬ 2. СТРАТЕГИЯ", closedCount: 4, open: true,
          closed: [
            { text: "Что из перечисленного НЕ входит в канву бизнес-модели (Business Model Canvas)?", options: ["Ценностные предложения", "Ключевые партнёры", "Потоки доходов", "Годовая отчётность перед акционерами"], correct: "D" },
            { text: "Какой элемент является центральным в концепции LoveMark?", options: ["Низкая цена", "Максимальное количество продуктов в линейке", "Агрессивная реклама", "Эмоциональная связь с брендом, выходящая за рамки рациональной выгоды"], correct: "D" },
            { text: "Что такое «карта гипотез» в контексте поиска точек роста?", options: ["Географическая карта офисов", "Схема проезда до работы", "План эвакуации при пожаре", "Структурированный перечень предположений о том, как улучшить бизнес, с приоритетами и критериями проверки"], correct: "D" },
            { text: "Что из перечисленного является примером человекоцентричности в банковском сервисе?", options: ["Увеличение числа продуктов в линейке", "Снижение затрат на поддержку", "Проектирование сервиса вокруг потребностей клиента, а не внутренних процессов банка", "Автоматизация без возможности обратиться к человеку"], correct: "C" }
          ], openText: "Приведите 1–2 примера из вашей работы, где вы применяли стратегическое мышление или работали с гипотезами роста для клиента / партнёра. Что это было за ситуация? Какие шаги предприняли?" },
        { name: "ОБЛАСТЬ 3. РЕИНЖИНИРИНГ ПРОЦЕССОВ И ОРГСТРУКТУРЫ", closedCount: 4, open: true,
          closed: [
            { text: "Что такое «клиентский путь» (Customer Journey Map, CJM)?", options: ["Список покупок клиента", "Визуализация последовательности взаимодействий клиента с компанией от первого контакта до завершения", "Штатное расписание отдела продаж", "Техническая документация для разработчиков"], correct: "B" },
            { text: "Какой метод используется для оптимизации процессов?", options: ["AS-IS → TO-BE", "Только мозговой штурм", "Случайный выбор нового процесса", "Запрет на любые изменения"], correct: "A" },
            { text: "Что из перечисленного является Core-финтех-продуктом Сбера?", options: ["Okko", "2ГИС", "Самокат", "СберБанк Онлайн / SberPay"], correct: "D" },
            { text: "Что из перечисленного является первым шагом в реинжиниринге процесса?", options: ["Внедрение нового ПО", "Описание текущего процесса «AS-IS» и его проблем", "Увольнение сотрудников", "Покупка нового оборудования"], correct: "B" }
          ], openText: "Опишите ситуацию, где вы анализировали или улучшали какой-либо процесс в вашей работе (с клиентом, партнёром или внутри команды). Как выглядел процесс «как есть» (AS-IS)? Что вы предложили изменить («как будет» — TO-BE)?" },
        { name: "ОБЛАСТЬ 4. ПРОЕКТИРОВАНИЕ И РАЗРАБОТКА РЕШЕНИЯ", closedCount: 4, open: true,
          closed: [
            { text: "Что из перечисленного является принципом Agile?", options: ["Итеративность, адаптивность, работающий продукт как главная мера прогресса", "Жёсткое планирование на 2 года вперёд", "Полное отсутствие документации", "Только индивидуальная работа, без команды"], correct: "A" },
            { text: "Что такое Sbergile?", options: ["Адаптация Agile-методологий под процессы и культуру Сбера", "Фирменный кофе в офисе Сбера", "Название нового продукта для бизнеса", "HR-система оценки персонала"], correct: "A" },
            { text: "Что из перечисленного входит в партнёрскую программу Сбера?", options: ["Только спонсорство спортивных мероприятий", "Запрет на любые партнёрства", "Модели совместного продвижения, интеграции продуктов и revenue share с партнёрами экосистемы", "Только разовые скидки для сотрудников"], correct: "C" },
            { text: "Что такое продуктовое мышление?", options: ["Фокус на технических характеристиках продукта", "Фокус на ценности для клиента и результате, а не на выполнении формальных требований", "Создание максимально сложного продукта", "Игнорирование обратной связи"], correct: "B" }
          ], openText: "Вспомните проект или задачу, где вы работали с партнёром Сбера (или внутри экосистемы). Как вы выстраивали взаимодействие? Какие инструменты проектного или продуктового менеджмента использовали?" },
        { name: "ОБЛАСТЬ 5. ВНЕДРЕНИЕ И РАЗВИТИЕ РЕШЕНИЯ", closedCount: 3, open: true,
          closed: [
            { text: "Что такое «Продуктовая полка Сбера»?", options: ["Магазин сувениров для сотрудников", "Единый реестр (портфель) готовых цифровых решений и продуктов, доступных для тиражирования внутри банка и экосистемы", "Мебель в переговорной", "Список книг, рекомендованных к прочтению"], correct: "B" },
            { text: "Какой формат партнёрства предполагает совместное владение активами и разделение рисков?", options: ["Агентский договор", "Простое письмо о намерениях", "Договор аренды", "Совместное предприятие (Joint Venture)"], correct: "D" },
            { text: "Что из перечисленного является примером успешного внедрения решения в экосистеме Сбера?", options: ["Разработка нового внутреннего регламента", "Проведение внутреннего совещания", "Создание презентации для руководства", "Интеграция сервиса партнёра в СберБанк Онлайн, которую начали использовать 100 000 клиентов"], correct: "D" }
          ], openText: "Назовите 1–2 решения (продукта, сервиса, интеграции), которые вы помогали внедрять для клиента или партнёра. Какие результаты были достигнуты (цифры, факты, отзывы)?" },
        { name: "ОБЛАСТЬ 6. ОБЩЕСИСТЕМНЫЕ КОМПЕТЕНЦИИ И МЕТОДОЛОГИЯ ПРОЕКТОВ РАЗВИТИЯ", closedCount: 4, open: true,
          closed: [
            { text: "Что описывает процесс ЦТ П3181?", options: ["Жизненный цикл проекта цифровой трансформации в Сбере (от идеи до внедрения и сопровождения)", "Порядок увольнения сотрудников", "Бухгалтерский учёт основных средств", "Процесс закупки канцтоваров"], correct: "A" },
            { text: "Для какой цели рекомендуется использовать GigaChat в проектах развития?", options: ["Только для развлечения", "Для генерации гипотез, написания кода, саммари встреч, анализа документов и поиска идей", "Для замены всех руководителей", "Для отправки личных сообщений"], correct: "B" },
            { text: "Что из перечисленного относится к инструментам CSM в рамках ЕФС «НашБизнес»?", options: ["Только электронная почта", "Бумажный журнал учёта", "Корпоративная столовая", "Конструктор гипотез, трекер задач и портфель проектов развития"], correct: "D" },
            { text: "Что из перечисленного является целью системы мотивации CSM?", options: ["Наказать за ошибки", "Стимулировать достижение целей цифровой трансформации и качества работы с клиентами / партнёрами", "Увеличить количество совещаний", "Снизить зарплаты"], correct: "B" }
          ], openText: "Расскажите о вашем опыте использования GigaChat или других инструментов CSM (ЕФС «НашБизнес», АС «Эксперт» и др.). Как конкретно вы их применяли? Какой результат получили?" },
        { name: "ОБЛАСТЬ 7. ОТРАСЛЕВЫЕ КОМПЕТЕНЦИИ", closedCount: 4, open: true,
          closed: [
            { text: "Какой из факторов НЕ является драйвером отрасли при стратегическом анализе?", options: ["Технологические инновации", "Изменение госрегулирования", "Рыночные тренды и поведение конкурентов", "Цвет стен в офисе"], correct: "D" },
            { text: "Что из перечисленного является операционным KPI в производственной отрасли?", options: ["ROE", "OEE (общая эффективность оборудования)", "Рыночная капитализация", "Количество подписчиков в Telegram"], correct: "B" },
            { text: "Что такое проектное финансирование?", options: ["Обычный кредит на любые цели", "Финансирование инвестиционного проекта под его будущие денежные потоки, часто с ограниченным регрессом на заёмщика", "Микрозайм до зарплаты", "Оплата командировочных расходов"], correct: "B" },
            { text: "Какой из перечисленных рисков является ключевым в производственной отрасли?", options: ["Риск неправильного выбора цвета логотипа", "Риск повышения зарплат офисных сотрудников", "Риск остановки производства из-за поломки оборудования или сбоя в цепочке поставок", "Риск отсутствия кофе в кулере"], correct: "C" }
          ], openText: "Назовите 2–3 ключевых вызова или тренда в отрасли ваших клиентов (например, производство, ритейл, логистика). Как эти вызовы влияют на их потребности в продуктах / сервисах Сбера и экосистемы?" },
        { name: "ОБЛАСТЬ 8. SOFT SKILLS", closedCount: 4, open: true,
          closed: [
            { text: "Что из перечисленного является проявлением системного мышления?", options: ["Решение проблемы изолированно, без учёта связей с другими элементами", "Игнорирование обратной связи", "Быстрые решения без анализа", "Анализ проблемы как части целостной системы, учёт причинно-следственных связей и косвенных эффектов"], correct: "D" },
            { text: "Какое поведение характеризует «управление результатом»?", options: ["Постановка SMART-целей, мониторинг прогресса, коррекция действий и доведение до результата", "Перекладывание ответственности на других", "Ожидание указаний сверху по каждому шагу", "Хаотичное переключение между задачами без завершения"], correct: "A" },
            { text: "Что из перечисленного относится к навыку «управление собой»?", options: ["Эмоциональная реакция на любой негатив", "Прокрастинация до дедлайна", "Саморегуляция, тайм-менеджмент, стрессоустойчивость и поддержание работоспособности", "Постоянное согласие со всеми"], correct: "C" },
            { text: "Что из перечисленного является проявлением ответственности?", options: ["Поиск виноватых при ошибке", "Сокрытие проблемы", "Перекладывание задачи на коллегу", "Признание ошибки, анализ причин и предложение решения"], correct: "D" }
          ], openText: "Опишите ситуацию из вашей работы, где вам пришлось решать сложную проблему с участием нескольких сторон (клиент, партнёр, внутренние подразделения). Как вы действовали? Какие soft skills помогли?" }
    ];

    let currentArea = 0;
    let answers = {
        userName: "",
        closed: AREAS.map(() => []),
        open: AREAS.map(() => "")
    };

    function loadFromLocalStorage() {
        const saved = localStorage.getItem("csm_full_test");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                answers.userName = parsed.userName || "";
                answers.closed = parsed.closed || AREAS.map(() => []);
                answers.open = parsed.open || AREAS.map(() => "");
                for (let i = 0; i < AREAS.length; i++) {
                    if (!answers.closed[i]) answers.closed[i] = [];
                    while (answers.closed[i].length < AREAS[i].closedCount) answers.closed[i].push(null);
                }
            } catch(e) {}
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem("csm_full_test", JSON.stringify(answers));
    }

    function render() {
        const card = document.getElementById("surveyCard");
        const area = AREAS[currentArea];
        const total = AREAS.length;
        const percent = ((currentArea + 1) / total) * 100;

        let html = `
            <div class="header">
                <h1>📋 Тест CSM 2.0</h1>
                <p>8 областей компетенций</p>
            </div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                <div class="progress-text">Область ${currentArea+1} из ${total}</div>
            </div>
            <div class="content">
                <div class="user-info">
                    <h3>👤 Ваши данные (не анонимно)</h3>
                    <div class="form-group">
                        <label>ФИО *</label>
                        <input type="text" id="fio" value="${escapeHtml(answers.userName)}" placeholder="Иванов Иван Иванович">
                    </div>
                </div>
                <div class="area-title">📌 ${area.name}</div>
        `;

        for (let i = 0; i < area.closed.length; i++) {
            const q = area.closed[i];
            const savedVal = answers.closed[currentArea]?.[i];
            html += `<div class="question-block">
                        <div class="question-text">${currentArea+1}.${i+1}. ${escapeHtml(q.text)}</div>
                        <div class="options">`;
            for (let optIdx = 0; optIdx < q.options.length; optIdx++) {
                const opt = q.options[optIdx];
                const letter = String.fromCharCode(65 + optIdx);
                const isChecked = (savedVal === letter);
                html += `<label class="option">
                            <input type="radio" name="q_${i}" value="${letter}" ${isChecked ? 'checked' : ''}>
                            <span>${escapeHtml(opt)}</span>
                         </label>`;
            }
            html += `</div></div>`;
        }

        if (area.open) {
            html += `<div class="question-block open-question">
                        <div class="question-text">${currentArea+1}.${area.closed.length+1} (открытый). ${escapeHtml(area.openText)}</div>
                        <textarea id="openAnswer" rows="4">${escapeHtml(answers.open[currentArea] || '')}</textarea>
                    </div>`;
        }

        html += `<div class="navigation">`;
        if (currentArea > 0) html += `<button class="secondary" id="prevBtn">← Назад</button>`;
        else html += `<div></div>`;
        if (currentArea < total - 1) html += `<button id="nextBtn">Далее →</button>`;
        else html += `<button id="submitBtn" class="submit-btn">✅ Завершить и отправить опрос</button>`;
        html += `</div></div>`;

        card.innerHTML = html;

        document.getElementById("fio")?.addEventListener('input', (e) => {
            answers.userName = e.target.value;
            saveToLocalStorage();
        });

        for (let i = 0; i < area.closed.length; i++) {
            const radios = document.querySelectorAll(`input[name="q_${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    answers.closed[currentArea][i] = e.target.value;
                    saveToLocalStorage();
                });
            });
        }

        if (area.open) {
            document.getElementById("openAnswer")?.addEventListener('input', (e) => {
                answers.open[currentArea] = e.target.value;
                saveToLocalStorage();
            });
        }

        document.getElementById("prevBtn")?.addEventListener('click', () => {
            if (validateCurrentArea()) {
                currentArea--;
                render();
            } else {
                showMessage("❌ Ответьте на все закрытые вопросы в этой области", 'error');
            }
        });

        document.getElementById("nextBtn")?.addEventListener('click', () => {
            if (validateCurrentArea()) {
                currentArea++;
                render();
            } else {
                showMessage("❌ Ответьте на все закрытые вопросы в этой области", 'error');
            }
        });

        document.getElementById("submitBtn")?.addEventListener('click', submitAll);
    }

    function validateCurrentArea() {
        const closed = answers.closed[currentArea];
        if (!closed) return false;
        return closed.length === AREAS[currentArea].closedCount && closed.every(v => v !== null && v !== undefined);
    }

    function submitAll() {
        if (!answers.userName?.trim()) {
            showMessage("❌ Введите ФИО", 'error');
            return;
        }
        for (let i = 0; i < AREAS.length; i++) {
            const closed = answers.closed[i];
            if (!closed || closed.length !== AREAS[i].closedCount || closed.some(v => v === null)) {
                currentArea = i;
                render();
                showMessage(`❌ Ответьте на все вопросы в области ${i+1}`, 'error');
                return;
            }
        }

        const now = new Date();
        const date = now.toLocaleDateString('ru-RU');
        const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = SCRIPT_URL;
        form.target = 'hiddenFrame';

        const fields = { userName: answers.userName, date, time };

        for (let a = 0; a < AREAS.length; a++) {
            const area = AREAS[a];
            for (let q = 0; q < area.closed.length; q++) {
                const val = answers.closed[a][q];
                const correct = (val === area.closed[q].correct) ? "Да" : "Нет";
                fields[`q${a+1}_${q+1}`] = val;
                fields[`q${a+1}_${q+1}c`] = correct;
            }
            if (area.open) {
                fields[`q${a+1}_${area.closed.length+1}`] = answers.open[a] || "(не заполнено)";
            }
        }

        for (const [key, value] of Object.entries(fields)) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = value;
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);

        showThankYouWindow(answers.userName);
        localStorage.removeItem("csm_full_test");
    }

    function showThankYouWindow(userName) {
        const card = document.getElementById("surveyCard");
        card.innerHTML = `
            <div class="header">
                <h1>📋 Тест CSM 2.0</h1>
                <p>Спасибо за прохождение</p>
            </div>
            <div class="content" style="text-align: center; padding: 40px;">
                <h2 style="color: #1e4b6e; margin-bottom: 16px;">🙏 Спасибо, ${escapeHtml(userName)}!</h2>
                <p style="font-size: 1.1rem; margin-bottom: 24px;">Ваши ответы успешно сохранены.<br>Это поможет нам стать лучше.</p>
                <button onclick="window.close()" style="background: #2c7da0; padding: 12px 32px; font-size: 1rem; border: none; border-radius: 40px; color: white; cursor: pointer;">Закрыть страницу</button>
                <p style="margin-top: 24px; font-size: 0.8rem; color: #64748b;">Вы можете закрыть это окно или вкладку браузера.</p>
            </div>
        `;
        const footer = document.querySelector("footer");
        if (footer) footer.style.display = "none";
    }

    function showMessage(text, type) {
        let msgDiv = document.getElementById("dynamicMessage");
        if (!msgDiv) {
            msgDiv = document.createElement("div");
            msgDiv.id = "dynamicMessage";
            document.querySelector("#surveyCard .content").appendChild(msgDiv);
        }
        msgDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
        if (type === 'success') setTimeout(() => msgDiv.innerHTML = '', 4000);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadFromLocalStorage();
    render();
</script>
</body>
</html>
