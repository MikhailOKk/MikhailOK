<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Самооценка CSM 2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #1e293b;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e4b6e 0%, #2c7da0 100%);
            color: white;
            padding: 28px;
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .header p { opacity: 0.9; }
        .content { padding: 28px; }
        .user-info {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 28px;
        }
        .form-group { max-width: 400px; }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
        }
        .area-title {
            background: #e6f0f5;
            padding: 14px 20px;
            margin: 0 -28px 20px -28px;
            border-left: 6px solid #2c7da0;
            font-size: 1.35rem;
            font-weight: 600;
        }
        .question-block {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .rating-scale {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }
        .rating-option {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f8fafc;
            padding: 6px 10px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .rating-option.selected {
            background: #2c7da0;
            color: white;
        }
        .rating-option input {
            display: none;
        }
        .rating-option span {
            font-size: 0.9rem;
            font-weight: 500;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 24px;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }
        button.secondary { background: #94a3b8; }
        button:hover { background: #1e5a74; }
        .submit-btn {
            background: #10b981;
            width: 100%;
            margin-top: 16px;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-weight: 500;
        }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
        footer { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 16px; }
        iframe { display: none; }
        .progress-section {
            padding: 12px 28px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .progress-bar {
            background: #e2e8f0;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: #2c7da0;
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 0.8rem;
            margin-top: 6px;
            color: #475569;
            text-align: right;
        }
        @media (max-width: 640px) {
            .content { padding: 20px; }
            .area-title { margin: 0 -20px 20px -20px; }
            .rating-scale { gap: 6px; }
            .rating-option { padding: 4px 8px; }
            .rating-option span { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="surveyCard"></div>
    <footer>Прогресс автоматически сохраняется</footer>
</div>
<iframe name="hiddenFrame" style="display:none"></iframe>

<script>
    // ⚠️ ВСТАВЬТЕ ВАШ URL ИЗ APPS SCRIPT (ПОСЛЕ ПЕРЕРАЗВЕРТЫВАНИЯ)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtNZjcFlmWp5xhwHzvDNeQxyapdxb0UFAxZ_hnQ0xZZWzC57f_jyIKJPvTN5iBSqM/exec";

    const AREAS = [
        { name: "Область 1. Осознание (тренды и цифровая трансформация)", questions: [
            "Понимаю тренды: AI, Big Data, IoT, Web 3.0, Cloud, Blockchain",
            "Понимаю цели, задачи и архитектуру цифровой трансформации банка",
            "Знаю отраслевые кейсы и особенности технологического развития в нашей отрасли"
        ]},
        { name: "Область 2. Стратегия", questions: [
            "Мыслю стратегически (вижу картину на 3–5 лет)",
            "Знаю Стратегию Сбера и КПБ бизнес-модель сегмента",
            "Могу описать бизнес-модель компании через Business Model Canvas",
            "Умею находить точки роста и формулировать гипотезы трансформации (карта гипотез)",
            "Понимаю модели управления цифровой трансформацией и цифровые роли в компании",
            "Разделяю концепцию LoveMark и человекоцентричности"
        ]},
        { name: "Область 3. Реинжиниринг процессов и оргструктуры", questions: [
            "Понимаю цели и задачи клиентских исследований",
            "Владею бизнес-анализом и реинжинирингом процессов",
            "Могу описать и спроектировать клиентский путь (Customer Journey Map, CJM)",
            "Знаю цифровые Core-продукты Сбера (финтех)",
            "Знаю финансовые и транзакционные Core-продукты Сбера",
            "Понимаю основы IT-архитектуры",
            "Могу провести финансовую и экономическую оценку проектов"
        ]},
        { name: "Область 4. Проектирование и разработка решения", questions: [
            "Владею продуктовым менеджментом и продуктовым мышлением",
            "Владею проектным менеджментом (Agile, Waterfall, Sbergile, PMBok, IPMA)",
            "Понимаю основы управления процессом разработки ПО",
            "Знаю партнёрскую программу Сбера"
        ]},
        { name: "Область 5. Внедрение и развитие решения", questions: [
            "Знаю форматы партнёрств и основы патентного права",
            "Понимаю процессы постановки решений на Продуктовую полку Сбера"
        ]},
        { name: "Область 6. Общесистемные компетенции и методология проектов развития", questions: [
            "Знаю процесс цифровой трансформации (П3181)",
            "Владею инструментами CSM при реализации проектов (ЕФС «НашБизнес», АС «Эксперт»)",
            "Использую генеративные модели (GigaChat) в работе над проектами",
            "Понимаю систему мотивации CSM"
        ]},
        { name: "Область 7. Отраслевые компетенции", questions: [
            "Анализирую рынок, тренды, драйверы, госрегулирование и позицию отрасли",
            "Знаю специфику отрасли (производство, финансовый анализ, ключевые риски, операционные KPI)",
            "Ориентируюсь в продуктах и финансировании (кредитные/некредитные решения, ВЭД-продукты, проектное финансирование)"
        ]},
        { name: "Область 8. Soft skills", questions: [
            "Владею системным мышлением и решением проблем",
            "Умею управлять результатом и несу ответственность",
            "Управляю собой (эмоции, время, стресс)"
        ]}
    ];

    let currentArea = 0;
    let answers = {
        userName: "",
        ratings: []
    };

    function initRatings() {
        const totalQuestions = AREAS.reduce((sum, area) => sum + area.questions.length, 0);
        if (answers.ratings.length !== totalQuestions) {
            answers.ratings = new Array(totalQuestions).fill(null);
        }
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem("self_assessment");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                answers.userName = parsed.userName || "";
                answers.ratings = parsed.ratings || [];
                initRatings();
            } catch(e) { initRatings(); }
        } else {
            initRatings();
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem("self_assessment", JSON.stringify(answers));
    }

    function getQuestionIndex(areaIdx, qIdx) {
        let idx = 0;
        for (let a = 0; a < areaIdx; a++) {
            idx += AREAS[a].questions.length;
        }
        return idx + qIdx;
    }

    function render() {
        const card = document.getElementById("surveyCard");
        const area = AREAS[currentArea];
        const totalAreas = AREAS.length;
        const percent = ((currentArea + 1) / totalAreas) * 100;

        let html = `
            <div class="header">
                <h1>📊 Самооценка CSM 2.0</h1>
                <p>Оцените каждый пункт от 1 до 10</p>
            </div>
            <div class="progress-section">
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                <div class="progress-text">Область ${currentArea+1} из ${totalAreas}</div>
            </div>
            <div class="content">
                <div class="user-info">
                    <h3>👤 Ваши данные</h3>
                    <div class="form-group">
                        <label>ФИО *</label>
                        <input type="text" id="fio" value="${escapeHtml(answers.userName)}" placeholder="Иванов Иван Иванович">
                    </div>
                </div>
                <div class="area-title">📌 ${escapeHtml(area.name)}</div>
        `;

        for (let i = 0; i < area.questions.length; i++) {
            const globalIdx = getQuestionIndex(currentArea, i);
            const savedRating = answers.ratings[globalIdx];
            html += `<div class="question-block">
                        <div class="question-text">${escapeHtml(area.questions[i])}</div>
                        <div class="rating-scale" data-global-idx="${globalIdx}">`;
            for (let rating = 1; rating <= 10; rating++) {
                const isSelected = (savedRating === rating);
                html += `<label class="rating-option ${isSelected ? 'selected' : ''}" data-rating="${rating}">
                            <input type="radio" name="q_${globalIdx}" value="${rating}" ${isSelected ? 'checked' : ''}>
                            <span>${rating}</span>
                         </label>`;
            }
            html += `</div></div>`;
        }

        html += `<div class="navigation">`;
        if (currentArea > 0) html += `<button class="secondary" id="prevBtn">← Назад</button>`;
        else html += `<div></div>`;
        if (currentArea < totalAreas - 1) html += `<button id="nextBtn">Далее →</button>`;
        else html += `<button id="submitBtn" class="submit-btn">✅ Завершить самооценку</button>`;
        html += `</div></div>`;

        card.innerHTML = html;

        document.getElementById("fio")?.addEventListener('input', (e) => {
            answers.userName = e.target.value;
            saveToLocalStorage();
        });

        for (let i = 0; i < area.questions.length; i++) {
            const globalIdx = getQuestionIndex(currentArea, i);
            const radios = document.querySelectorAll(`input[name="q_${globalIdx}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    answers.ratings[globalIdx] = parseInt(e.target.value);
                    saveToLocalStorage();
                    const container = e.target.closest('.rating-scale');
                    if (container) {
                        Array.from(container.children).forEach(child => {
                            child.classList.remove('selected');
                        });
                        e.target.closest('.rating-option')?.classList.add('selected');
                    }
                });
            });
        }

        document.getElementById("prevBtn")?.addEventListener('click', () => {
            if (validateCurrentArea()) {
                currentArea--;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showMessage("❌ Оцените все утверждения в этой области", 'error');
            }
        });

        document.getElementById("nextBtn")?.addEventListener('click', () => {
            if (validateCurrentArea()) {
                currentArea++;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showMessage("❌ Оцените все утверждения в этой области", 'error');
            }
        });

        document.getElementById("submitBtn")?.addEventListener('click', submitAll);
    }

    function validateCurrentArea() {
        const area = AREAS[currentArea];
        let startIdx = 0;
        for (let a = 0; a < currentArea; a++) {
            startIdx += AREAS[a].questions.length;
        }
        for (let i = 0; i < area.questions.length; i++) {
            if (answers.ratings[startIdx + i] === null || answers.ratings[startIdx + i] === undefined) {
                return false;
            }
        }
        return true;
    }

    function validateAll() {
        const total = answers.ratings.length;
        for (let i = 0; i < total; i++) {
            if (answers.ratings[i] === null || answers.ratings[i] === undefined) {
                return false;
            }
        }
        return true;
    }

    function submitAll() {
        if (!answers.userName?.trim()) {
            showMessage("❌ Введите ФИО", 'error');
            return;
        }
        if (!validateAll()) {
            showMessage("❌ Оцените все 27 утверждений перед отправкой", 'error');
            return;
        }

        const now = new Date();
        const date = now.toLocaleDateString('ru-RU');
        const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = SCRIPT_URL;
        form.target = 'hiddenFrame';

        const fields = { userName: answers.userName, date, time };
        
        // ПРАВИЛЬНОЕ МАППИНГ: 27 оценок → поля qX_Y
        // Область 1: вопросы 1-3   → q1_1, q1_2, q1_3
        // Область 2: вопросы 4-9   → q2_1, q2_2, q2_3, q2_4, q2_5, q2_6
        // Область 3: вопросы 10-16 → q3_1, q3_2, q3_3, q3_4, q3_5, q3_6, q3_7
        // Область 4: вопросы 17-20 → q4_1, q4_2, q4_3, q4_4
        // Область 5: вопросы 21-22 → q5_1, q5_2
        // Область 6: вопросы 23-26 → q6_1, q6_2, q6_3, q6_4
        // Область 7: вопросы 27-29 → q7_1, q7_2, q7_3
        // Область 8: вопросы 30-32 → q8_1, q8_2, q8_3
        
        const mapping = [
            { area: 1, questions: [1,2,3] },
            { area: 2, questions: [1,2,3,4,5,6] },
            { area: 3, questions: [1,2,3,4,5,6,7] },
            { area: 4, questions: [1,2,3,4] },
            { area: 5, questions: [1,2] },
            { area: 6, questions: [1,2,3,4] },
            { area: 7, questions: [1,2,3] },
            { area: 8, questions: [1,2,3] }
        ];
        
        let ratingIndex = 0;
        for (let a = 0; a < mapping.length; a++) {
            const area = mapping[a];
            for (let q = 0; q < area.questions.length; q++) {
                const value = answers.ratings[ratingIndex];
                const fieldName = `q${area.area}_${area.questions[q]}`;
                fields[fieldName] = (value !== null && value !== undefined) ? value : "";
                ratingIndex++;
            }
        }

        for (const [key, value] of Object.entries(fields)) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = value;
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);

        showThankYouWindow(answers.userName);
        localStorage.removeItem("self_assessment");
    }

    function showThankYouWindow(userName) {
        const card = document.getElementById("surveyCard");
        card.innerHTML = `
            <div class="header">
                <h1>📊 Самооценка CSM 2.0</h1>
                <p>Спасибо</p>
            </div>
            <div class="content" style="text-align: center; padding: 40px;">
                <h2 style="color: #1e4b6e; margin-bottom: 16px;">🙏 Спасибо, ${escapeHtml(userName)}!</h2>
                <p style="font-size: 1.1rem; margin-bottom: 24px;">Ваша самооценка успешно сохранена.</p>
                <button onclick="window.close()" style="background: #2c7da0; padding: 12px 32px; font-size: 1rem; border: none; border-radius: 40px; color: white; cursor: pointer;">Закрыть страницу</button>
            </div>
        `;
        const footer = document.querySelector("footer");
        if (footer) footer.style.display = "none";
    }

    function showMessage(text, type) {
        let msgDiv = document.getElementById("dynamicMessage");
        if (!msgDiv) {
            msgDiv = document.createElement("div");
            msgDiv.id = "dynamicMessage";
            const contentDiv = document.querySelector("#surveyCard .content");
            if (contentDiv) contentDiv.appendChild(msgDiv);
        }
        if (msgDiv) msgDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
        setTimeout(() => { if (msgDiv) msgDiv.innerHTML = ''; }, 4000);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadFromLocalStorage();
    render();
</script>
</body>
</html>
